<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Records</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            background:#050505;
            color:white;
            min-height:100vh;
            padding:40px;
            overflow-x:hidden;
            position:relative;
        }

        /* BACKGROUND GLOW */

        body::before{
            content:"";
            position:absolute;
            width:700px;
            height:700px;
            background:radial-gradient(circle,
            rgba(255,70,70,0.30) 0%,
            rgba(255,0,70,0.10) 35%,
            transparent 70%);
            top:50%;
            left:50%;
            transform:translate(-50%,-50%);
            filter:blur(80px);
            z-index:0;
        }

        .container{
            position:relative;
            z-index:2;
        }

        /* NAVBAR */

        .navbar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:50px;
        }

        .logo{
            font-size:40px;
            font-weight:800;
        }

        .logo span{
            color:#ff4d4d;
        }

        .back-btn{
            text-decoration:none;
            padding:14px 28px;
            border-radius:16px;
            background:linear-gradient(135deg,#ff512f,#ff0844);
            color:white;
            font-weight:600;
            transition:0.3s;
        }

        .back-btn:hover{
            transform:translateY(-3px);
            box-shadow:0 0 20px rgba(255,70,70,0.4);
        }

        /* TITLE */

        .title-section{
            margin-bottom:40px;
        }

        .title-section h1{
            font-size:64px;
            line-height:1.1;
            margin-bottom:15px;
            font-weight:800;
        }

        .title-section p{
            color:#cfcfcf;
            font-size:18px;
            line-height:1.7;
            max-width:700px;
        }

        /* SEARCH */

        .search-box{
            margin:30px 0;
        }

        .search-box input{
            width:100%;
            max-width:400px;
            padding:18px 22px;
            border:none;
            outline:none;
            border-radius:18px;
            background:rgba(255,255,255,0.08);
            color:white;
            font-size:16px;
            backdrop-filter:blur(10px);
        }

        .search-box input::placeholder{
            color:#cfcfcf;
        }

        /* TABLE */

        .table-container{
            margin-top:30px;
            border-radius:28px;
            overflow:hidden;
            background:rgba(255,255,255,0.05);
            border:1px solid rgba(255,255,255,0.08);
            backdrop-filter:blur(20px);
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        thead{
            background:rgba(255,255,255,0.08);
        }

        th{
            padding:22px;
            text-align:left;
            font-size:17px;
            color:#ff7070;
        }

        td{
            padding:22px;
            border-top:1px solid rgba(255,255,255,0.05);
            color:#f1f1f1;
        }

        tbody tr{
            transition:0.3s;
        }

        tbody tr:hover{
            background:rgba(255,255,255,0.06);
        }

        /* DELETE BUTTON */

        .delete-btn{
            padding:10px 18px;
            border:none;
            border-radius:12px;
            background:linear-gradient(135deg,#ff512f,#ff0844);
            color:white;
            cursor:pointer;
            font-weight:600;
            transition:0.3s;
        }

        .delete-btn:hover{
            transform:scale(1.05);
            box-shadow:0 0 18px rgba(255,70,70,0.4);
        }

        /* RESPONSIVE */

        @media(max-width:900px){

            .title-section h1{
                font-size:42px;
            }

            table{
                min-width:900px;
            }

            .table-container{
                overflow-x:auto;
            }

        }
        /* PERFORMANCE BAR */

.progress-container{

    width:180px;
    height:18px;
    background:rgba(255,255,255,0.08);
    border-radius:20px;
    overflow:hidden;
}

.progress-bar{

    height:100%;
    border-radius:20px;
    background:linear-gradient(135deg,#00ff66,#66ff99);
    text-align:center;
    font-size:11px;
    font-weight:600;
    color:#000;
    line-height:18px;
}

    </style>
</head>

<body>

    <div class="container">

        <!-- NAVBAR -->

        <div class="navbar">

            <div class="logo">
                Employee<span>Sphere</span>
            </div>

            <a href="index.html" class="back-btn">
                ← Back Home
            </a>

        </div>

        <!-- TITLE -->

        <div class="title-section">

            <h1>
                Employee Records
            </h1>

            <p>
                View and manage all employee workforce records with modern analytics and organization tools.
            </p>

        </div>

        <!-- SEARCH -->

        <div class="search-box">

            <input type="text"
                   id="searchInput"
                   placeholder="Search Employee...">

        </div>

        <!-- TABLE -->

        <div class="table-container">

            <table>
                 <thead>

    <tr>

        <th>ID</th>
        <th>Name</th>
        <th>Department</th>
        <th>Login Time</th>
        <th>Worked Hours</th>
        <th>Salary</th>
        <th>Performance</th>
        <th>Action</th>

    </tr>

</thead>

<tbody id="employeeTable">

</tbody>

            </table>

        </div>

    </div>

    <script>

const API_URL = "http://localhost:9090/employees";

window.onload = function () {

    getEmployees();

};

function getEmployees() {

    fetch(API_URL)

    .then(response => response.json())

    .then(data => {

        let table = "";

        data.forEach((emp, index) => {

            // RANDOM VALUES

    let hour = Math.floor(Math.random() * 3) + 9; // 9 to 11
let minute = Math.floor(Math.random() * 60);

let ampm = hour >= 12 ? "PM" : "AM";

let formattedHour = hour > 12 ? hour - 12 : hour;

let formattedMinute = minute < 10 ? "0" + minute : minute;

let loginTime = `${formattedHour}:${formattedMinute} ${ampm}`;

            let workedHours = Math.floor(Math.random() * 4) + 6 + " hrs";

            let performance = Math.floor(Math.random() * 21) + 80;

            table += `

            <tr>

                <td>${index + 1}</td>

                <td>${emp.name}</td>

                <td>${emp.department}</td>

                <td>${loginTime}</td>

                <td>${workedHours}</td>

                <td>₹ ${emp.salary}</td>

                <td>

                    <div class="progress-container">

                        <div class="progress-bar"
                        style="width:${performance}%">

                            ${performance}%

                        </div>

                    </div>

                </td>

                <td>

                    <button class="delete-btn"
                    onclick="deleteEmployee(${emp.id})">

                    Delete

                    </button>

                </td>

            </tr>

            `;

        });

        document.getElementById("employeeTable")
        .innerHTML = table;

    });

}

function deleteEmployee(id){

    fetch(API_URL + "/" + id,{

        method:"DELETE"

    })

    .then(() => {

        getEmployees();

    });

}

</script>
</body>
</html>
